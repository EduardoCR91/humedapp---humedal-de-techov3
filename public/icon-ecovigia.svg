<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Icono EcoVigia</title>
  <desc id="desc">Un ave estilizada sobre un círculo verde, para usar como icono de la aplicación EcoVigia.</desc>

  <!-- Fondo circular -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="240" fill="url(#bg)" />

  <!-- Círculo interior -->
  <circle cx="256" cy="256" r="190" fill="#ecfdf5" opacity="0.9" />

  <!-- Ave simplificada -->
  <g transform="translate(110,150)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- cuerpo -->
    <path d="M60 170 Q150 40 260 90 Q230 170 150 200 Z" fill="#22c55e" stroke="#16a34a" stroke-width="8"/>
    <!-- ala -->
    <path d="M130 150 Q180 110 220 130 Q190 170 150 180 Z" fill="#0ea5e9" stroke="#0284c7" stroke-width="6"/>
    <!-- cabeza -->
    <circle cx="250" cy="110" r="26" fill="#0f766e" stroke="#064e3b" stroke-width="6"/>
    <!-- pico -->
    <path d="M274 112 L300 120 L274 128 Z" fill="#f97316" stroke="#ea580c" stroke-width="4"/>
    <!-- ojo -->
    <circle cx="246" cy="106" r="5" fill="#ecfeff"/>
  </g>

  <!-- Texto EcoVigia opcional (puede omitirse al generar launcher) -->
  <text x="256" y="448" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="48" fill="#ecfdf5">
    EcoVigia
  </text>
</svg>

