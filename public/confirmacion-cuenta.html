<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuenta confirmada | EcoVigia</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(145deg, #e8f7ef, #f7fbf9);
        color: #0f172a;
      }
      .card {
        width: min(92vw, 480px);
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid #dcfce7;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 16px 38px rgba(10, 35, 24, 0.15);
      }
      .ok {
        width: 48px;
        height: 48px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: #dcfce7;
        color: #166534;
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0 0 8px;
        color: #065f46;
        font-size: 1.35rem;
        line-height: 1.2;
      }
      p {
        margin: 0;
        color: #334155;
        line-height: 1.5;
      }
      .btn {
        margin-top: 18px;
        display: inline-block;
        text-decoration: none;
        padding: 10px 14px;
        border-radius: 12px;
        background: linear-gradient(145deg, rgba(4, 120, 87, 0.96), rgba(16, 163, 127, 0.92));
        color: #fff;
        font-weight: 700;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="ok">✓</div>
      <h1>Cuenta confirmada</h1>
      <p>Tu correo fue verificado correctamente. Ya puedes volver a EcoVigia e iniciar sesión.</p>
      <a class="btn" href="/">Ir a iniciar sesión</a>
    </main>
  </body>
  </html>
