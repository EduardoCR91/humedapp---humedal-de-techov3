<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EcoVigia – Icono Ave</title>
  <desc id="desc">Icono minimalista de un ave sobre un degradado verde‑azul.</desc>

  <defs>
    <!-- fondo redondo moderno -->
    <linearGradient id="bgBird" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="40%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- base circular -->
  <circle cx="256" cy="256" r="248" fill="#022c22"/>
  <circle cx="256" cy="256" r="228" fill="url(#bgBird)"/>

  <!-- disco interior para contraste -->
  <circle cx="256" cy="256" r="180" fill="#ecfdf5" opacity="0.96"/>

  <!-- ave minimalista -->
  <g transform="translate(120,150)" stroke-linecap="round" stroke-linejoin="round">
    <!-- cuerpo principal -->
    <path
      d="M60 170 C120 80 210 60 260 110 C230 170 180 210 120 210 Z"
      fill="#10b981"
      stroke="#059669"
      stroke-width="8"
    />
    <!-- ala tipo check -->
    <path
      d="M110 190 L170 135 L235 155"
      fill="none"
      stroke="url(#wing)"
      stroke-width="14"
    />
    <!-- cabeza circular -->
    <circle cx="250" cy="115" r="26" fill="#0369a1" stroke="#022c22" stroke-width="6"/>
    <!-- pico triangular -->
    <path d="M270 118 L300 128 L270 138 Z" fill="#f97316" stroke="#c2410c" stroke-width="4"/>
    <!-- ojo -->
    <circle cx="245" cy="110" r="5" fill="#ecfeff"/>
  </g>
</svg>
