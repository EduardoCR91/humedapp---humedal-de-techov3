<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EcoVigia – Icono Rana</title>
  <desc id="desc">Icono minimalista de una rana sobre un degradado verde.</desc>

  <defs>
    <linearGradient id="bgFrog" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="35%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <!-- fondo -->
  <circle cx="256" cy="256" r="248" fill="#022c22"/>
  <circle cx="256" cy="256" r="228" fill="url(#bgFrog)"/>

  <!-- cara de rana redondeada -->
  <g transform="translate(96,132)" stroke-linecap="round" stroke-linejoin="round">
    <!-- cabeza -->
    <rect x="40" y="80" width="240" height="190" rx="90" fill="#22c55e" stroke="#15803d" stroke-width="10"/>
    <!-- mejillas -->
    <circle cx="90" cy="210" r="18" fill="#bbf7d0" opacity="0.9"/>
    <circle cx="230" cy="210" r="18" fill="#bbf7d0" opacity="0.9"/>

    <!-- ojos -->
    <circle cx="110" cy="80" r="32" fill="#bbf7d0" stroke="#15803d" stroke-width="8"/>
    <circle cx="230" cy="80" r="32" fill="#bbf7d0" stroke="#15803d" stroke-width="8"/>
    <circle cx="110" cy="80" r="11" fill="#022c22"/>
    <circle cx="230" cy="80" r="11" fill="#022c22"/>

    <!-- sonrisa -->
    <path d="M110 205 Q160 235 210 205" fill="none" stroke="#166534" stroke-width="8"/>

    <!-- nariz -->
    <circle cx="150" cy="150" r="4" fill="#166534"/>
    <circle cx="190" cy="150" r="4" fill="#166534"/>
  </g>
</svg>
